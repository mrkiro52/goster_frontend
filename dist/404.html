<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>GOSTER - Форматирование документов по ГОСТ</title>
    <script>
      // Redirect all 404 requests to index.html
      // This is needed for GitHub Pages to support client-side routing (HashRouter)
      var segmentCount = 0,
          l = window.location;
      if (l.pathname.split('/').length > 2) {
        segmentCount = l.pathname.split('/').length - 2;
      }
      var url = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
                l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
                (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                l.hash;
      l.replace(url);
    </script>
  </head>
  <body>
  </body>
</html>
